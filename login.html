{% extends 'base.html' %}

{% block title %}Login - FarmConnect{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="farm-icon">🌱</div>
        <h3 class="text-center mb-4 text-success" style="font-weight: 700;">Welcome Back</h3>
        <p class="text-muted text-center mb-4">Login to access your agriculture dashboard.</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="farmer@example.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" oninvalid="this.setCustomValidity('Invalid mail id! Please enter in a proper format (e.g., name@example.com).')" oninput="this.setCustomValidity('')">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-farm w-100">Login</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-0">New to FarmConnect? <a href="{{ url_for('signup') }}" class="text-success text-decoration-none fw-bold">Sign up here</a></p>
        </div>
    </div>
</div>
{% endblock %}
