{% extends 'base.html' %}

{% block title %}Login - FarmConnect{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Professional SVG Brand Logo -->
        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C10.7 14.4 12 14 13.5 12.5"/></svg>
        </div>
        
        <h3>Welcome Back</h3>
        <p class="tagline">Enter your credentials to access your agriculture dashboard</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required 
                       placeholder="name@farmconnect.com"
                       pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                       oninvalid="this.setCustomValidity('Please enter a valid email address (e.g., name@gmail.com)')"
                       oninput="this.setCustomValidity('')">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-farm w-100">Sign In to Dashboard</button>
        </form>
        
        <div class="signup-section">
            <p class="mb-0 text-muted small">New to FarmConnect? <a href="{{ url_for('signup') }}" class="signup-link">Create Account</a></p>
        </div>
    </div>
</div>
{% endblock %}
