{% extends 'base.html' %}

{% block title %}Sign Up - FarmConnect{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C10.7 14.4 12 14 13.5 12.5"/></svg>
        </div>
        
        <h3>Create Account</h3>
        <p class="tagline">Join our secure agricultural platform today</p>
        
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="mb-4">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" required placeholder="Your full name">
            </div>
            <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required 
                       placeholder="name@farmconnect.com"
                       pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                       oninvalid="this.setCustomValidity('Please enter a valid email address')"
                       oninput="this.setCustomValidity('')">
            </div>

            <div class="mb-4">
                <label class="form-label">Account Type</label>
                <div class="d-flex gap-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="role" id="role_user" value="user" checked>
                        <label class="form-check-label small fw-bold" for="role_user">Farmer</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="role" id="role_admin" value="admin">
                        <label class="form-check-label small fw-bold" for="role_admin">Admin</label>
                    </div>
                </div>
            </div>

            <div class="mb-4" id="admin_code_div" style="display: none;">
                <label for="admin_code" class="form-label">Admin Secret Code <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="admin_code" name="admin_code" placeholder="Enter secret code for Admin access">
                <div class="form-text">Required for Admin registration:</div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="Create a strong password">
            </div>
            
            <button type="submit" class="btn btn-farm btn-register w-100">Register Account</button>
        </form>
        
        <div class="signup-section">
            <p class="mb-0 text-muted small">Already have an account? <a href="{{ url_for('login') }}" class="signup-link">Sign In</a></p>
        </div>
    </div>
</div>
