{% extends 'base.html' %}

{% block title %}Sign Up - FarmConnect{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="farm-icon">🌿</div>
        <h3 class="text-center mb-4 text-success" style="font-weight: 700;">Create Account</h3>
        <p class="text-muted text-center mb-4">Join our secure agricultural platform.</p>
        
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" required placeholder="John Farmer">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="farmer@example.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" oninvalid="this.setCustomValidity('Invalid mail id! Please enter in a proper format (e.g., name@example.com).')" oninput="this.setCustomValidity('')">
                <div class="form-text">Include 'admin' in email for admin role (demo).</div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="Create password">
            </div>
            <button type="submit" class="btn btn-farm w-100">Sign Up</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-success text-decoration-none fw-bold">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
